name: Freemchost Auto Renew Permanent

on:
  schedule:
    - cron: '10 3 * * *'
  workflow_dispatch:

jobs:
  browser-auto-renew:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: 执行自动化续期脚本
        env:
          FREE_EMAIL: ${{ secrets.FREE_EMAIL }}
          FREE_PASSWORD: ${{ secrets.FREE_PASSWORD }}
          SERVER_PAGE_URL: ${{ secrets.SERVER_PAGE_URL }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: node renew.js

      - name: 上传运行截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Freemchost-Screenshots-${{ github.run_number }}
          path: screenshots/*.png
          if-no-files-found: ignore
          retention-days: 7
